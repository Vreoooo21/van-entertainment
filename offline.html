<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111114">
  <title>VAN CMS | Offline</title>
  <link rel="icon" href="images/app-icons/icon-192.png">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#111114;color:#f5f5f6;font-family:Arial,sans-serif}.card{width:min(520px,100%);padding:34px;border:1px solid #303036;border-radius:22px;background:#1b1b20;text-align:center}.card img{width:92px;height:92px;border-radius:22px}.card h1{margin:20px 0 10px}.card p{color:#b8b8c0;line-height:1.6}.card button{margin-top:18px;padding:12px 18px;border:0;border-radius:12px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <img src="images/app-icons/icon-192.png" alt="VAN CMS">
    <h1>Kamu sedang offline</h1>
    <p>Hubungkan HP ke internet untuk membuka data terbaru dari VAN CMS.</p>
    <button type="button" onclick="location.reload()">Coba lagi</button>
  </main>
</body>
</html>
